<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <!-- Outer border circle -->
  <circle cx="250" cy="250" r="234" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <!-- Inner thin ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.45"/>

  <!-- Top ornament -->
  <text x="250" y="188"
    font-family="Georgia, serif" font-size="11"
    fill="#FFFFFF" text-anchor="middle" opacity="0.6"
    letter-spacing="10">✦  ·  ✦</text>

  <!-- Korean title -->
  <text x="250" y="258"
    font-family="'Noto Serif KR', 'Apple SD Gothic Neo', 'Malgun Gothic', serif"
    font-size="52" font-weight="600"
    fill="#FFFFFF" text-anchor="middle">그때, 우리는</text>

  <!-- Divider line -->
  <line x1="162" y1="276" x2="338" y2="276"
    stroke="#FFFFFF" stroke-width="0.8" opacity="0.45"/>

  <!-- English subtitle -->
  <text x="253" y="301"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="13" font-weight="400"
    fill="#FFFFFF" text-anchor="middle" letter-spacing="5">TIME CAPSULE</text>

  <!-- Bottom ornament -->
  <text x="250" y="323"
    font-family="Georgia, serif" font-size="11"
    fill="#FFFFFF" text-anchor="middle" opacity="0.6"
    letter-spacing="10">✦  ·  ✦</text>
</svg>
